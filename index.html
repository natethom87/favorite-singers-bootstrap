<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorite Singers</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f4f4;
        }

        .hero {
            padding: 40px 0;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container hero">

        <h1 class="text-center mb-5">Favorite Singers</h1>

        <div class="row">

            <div class="col-sm-4">
            <img src="images/singers.jpg">
            </div>

            <div class="col-sm-8">
                <table class="table table-striped table-hover">
                    <thead class="table-primary">
                        <tr>
                            <th>Singer</th>
                            <th>Date of Birth</th>
                            <th>Best Song</th>
                            <th>Hometown</th>
                        </tr>
                    </thead>
                    <tbody id="singerTableBody"></tbody>
                </table>
            </div>

        </div>

    </div>

    <script src="js/main.js"></script>

</body>
</html>
